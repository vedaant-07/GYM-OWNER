services:
  - type: web
    name: se7enfit-gym-owner
    runtime: static
    branch: main
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_API_BASE_URL
        value: https://se7en-fit-api.onrender.com/api
      - key: VITE_ADMIN_DASHBOARD_URL
        value: https://se7enfit-admin.onrender.com/admin
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html
